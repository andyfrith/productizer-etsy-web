# Productizer local development — see specs/tech-stack.html
services:
  postgres:
    image: postgres:16-alpine
    container_name: productizer-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: productizer
      POSTGRES_PASSWORD: productizer
      POSTGRES_DB: productizer
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U productizer -d productizer"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
